<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Google OAuth</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            margin-top: 0;
            color: #333;
        }
        button {
            background: #4285f4;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        button:hover {
            background: #357ae8;
        }
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            font-size: 14px;
        }
        .status {
            margin: 15px 0;
            padding: 10px;
            border-radius: 6px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 Google OAuth Test</h1>
        
        <div class="info">
            <strong>Backend URL:</strong> http://localhost:8000<br>
            <strong>OAuth Endpoint:</strong> /auth/google/login
        </div>

        <button onclick="testDirectAccess()">
            Test 1: Direct Browser Redirect
        </button>

        <button onclick="testFetch()">
            Test 2: Fetch API (Check Console)
        </button>

        <button onclick="testCORS()">
            Test 3: Test CORS
        </button>

        <div id="status"></div>
    </div>

    <script>
        function showStatus(message, isError = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status ' + (isError ? 'error' : 'success');
            statusDiv.textContent = message;
        }

        function testDirectAccess() {
            showStatus('Redirecting to Google OAuth...');
            setTimeout(() => {
                window.location.href = 'http://localhost:8000/auth/google/login';
            }, 500);
        }

        async function testFetch() {
            try {
                showStatus('Testing endpoint with fetch...');
                const response = await fetch('http://localhost:8000/auth/google/login', {
                    method: 'GET',
                    redirect: 'manual'
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);
                
                if (response.status === 0) {
                    showStatus('✅ Redirect detected (status 0). Endpoint works!');
                } else if (response.status === 307 || response.status === 302) {
                    showStatus('✅ Redirect response received. Endpoint works!');
                } else {
                    showStatus(`❌ Unexpected status: ${response.status}`, true);
                }
            } catch (error) {
                console.error('Fetch error:', error);
                showStatus(`❌ Error: ${error.message}`, true);
            }
        }

        async function testCORS() {
            try {
                showStatus('Testing CORS...');
                const response = await fetch('http://localhost:8000/', {
                    method: 'GET'
                });
                const data = await response.json();
                console.log('Root endpoint response:', data);
                showStatus('✅ CORS is working! Backend is accessible.');
            } catch (error) {
                console.error('CORS error:', error);
                showStatus(`❌ CORS Error: ${error.message}`, true);
            }
        }
    </script>
</body>
</html>
